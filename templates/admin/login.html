<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ — {{ settings.APP_NAME }}</title>
    <link rel="icon" type="image/svg+xml" href="/static/images/voscene-icon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: 'Inter', 'IBM Plex Sans Thai', system-ui, sans-serif; }</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4" style="background: radial-gradient(circle at 30% 20%, #185FA5 0%, #0A1628 60%);">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-2xl p-8">
            <div class="text-center mb-8">
                <img src="/static/images/voscene-horizontal.png" alt="Voscene" class="h-12 w-auto mx-auto mb-3">
                <p class="text-slate-500 text-sm" style="font-family: 'Space Grotesk', sans-serif;">One touch. Total control.</p>
                <p class="text-slate-400 text-xs mt-3">เข้าสู่ระบบหลังบ้าน</p>
            </div>

            {% if error %}
            <div class="mb-4 px-4 py-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm">
                {% if error == 'invalid' %}ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง{% else %}เกิดข้อผิดพลาด{% endif %}
            </div>
            {% endif %}

            <form method="post" action="/admin/login" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">ชื่อผู้ใช้</label>
                    <input type="text" name="username" required class="w-full border border-slate-300 rounded-lg px-4 py-2.5 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none" placeholder="admin">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">รหัสผ่าน</label>
                    <input type="password" name="password" required class="w-full border border-slate-300 rounded-lg px-4 py-2.5 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none">
                </div>
                <button type="submit" class="w-full py-3 rounded-lg text-white font-semibold transition" style="background-color: #3B82F6;" onmouseover="this.style.backgroundColor='#2563eb'" onmouseout="this.style.backgroundColor='#3B82F6'">เข้าสู่ระบบ</button>
            </form>

            <a href="/" class="block text-center text-sm text-slate-500 hover:text-slate-700 mt-6">← กลับหน้าเว็บ</a>
        </div>
    </div>
</body>
</html>
